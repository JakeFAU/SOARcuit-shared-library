name: Publish Package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: soarcuit
  REGION: us-east4
  REPOSITORY: soarcuit-dev-python-repo
  INDEX_NAME: soarcuit-dev-python-repo
  PUBLISH_SA: soarcuit-dev-deploy@soarcuit.iam.gserviceaccount.com

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Auth to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.PUBLISH_SA }}
          token_format: access_token

      - name: Build distributions
        run: uv build --no-sources

      - name: Publish to Artifact Registry
        env:
          UV_PUBLISH_USERNAME: oauth2accesstoken
          UV_PUBLISH_PASSWORD: ${{ steps.auth.outputs.access_token }}
        run: uv publish --index "${INDEX_NAME}"
